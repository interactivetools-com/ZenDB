name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      php:
        description: 'PHP version (blank = all)'
        required: false
        type: choice
        options: ['', '8.1', '8.2', '8.3', '8.4', '8.5']
      database:
        description: 'Database (blank = all)'
        required: false
        type: choice
        # Dropdown convenience only - the matrix reads the canonical list from .github/db-matrix.json
        options:
          - ''
          - mysql:5.7
          - mysql:8.0
          - mysql:8.4
          - mysql:9.6
          - mysql:9.7
          - mariadb:10.2
          - mariadb:10.3
          - mariadb:10.4
          - mariadb:10.5
          - mariadb:10.6
          - mariadb:10.11
          - mariadb:11.4
          - mariadb:11.8
          - mariadb:12.3
          - percona/percona-server:5.7
          - percona/percona-server:8.0
          - percona/percona-server:8.4

jobs:
  db-matrix:
    name: Load database matrix
    runs-on: ubuntu-latest
    outputs:
      databases: ${{ steps.load.outputs.databases }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Read .github/db-matrix.json
        id: load
        run: echo "databases=$(jq -c . .github/db-matrix.json)" >> "$GITHUB_OUTPUT"

  test:
    name: PHP ${{ matrix.php }} / ${{ matrix.database }}
    runs-on: ubuntu-latest
    needs: db-matrix

    strategy:
      fail-fast: false
      matrix:
        php: ${{ inputs.php && fromJSON(format('["{0}"]', inputs.php)) || fromJSON('["8.1","8.2","8.3","8.4","8.5"]') }}
        database: ${{ inputs.database && fromJSON(format('["{0}"]', inputs.database)) || fromJSON(needs.db-matrix.outputs.databases) }}

    services:
      database:
        image: ${{ matrix.database }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_ROOT_HOST: '%'
          # MariaDB-specific (ignored by MySQL)
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: yes
          MARIADB_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --innodb_initialized || mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --security-opt seccomp=unconfined

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, openssl, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -u root --silent 2>/dev/null && break
            sleep 1
          done

      - name: Run tests
        run: vendor/bin/phpunit --colors=always --log-junit junit.xml
        env:
          DB_HOSTNAME: 127.0.0.1
          DB_USERNAME: root
          DB_PASSWORD: ''
          DB_DATABASE: phpunit_test_db

      - name: Record timing
        if: always()
        run: |
          SLUG=$(echo "${{ matrix.php }}-${{ matrix.database }}" | tr ':/' '--')
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"
          php .github/scripts/ci-timing.php junit.xml "${{ matrix.php }}" "${{ matrix.database }}" "timing-$SLUG.json"

      - name: Upload timing
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: timing-${{ env.SLUG }}
          path: timing-*.json
          if-no-files-found: ignore

  # One job per extra platform at the PHP 8.1 floor, all on MySQL 8.0: OS/arch bugs
  # (backslash paths, case-insensitive filenames, mysqli client builds) don't vary by
  # PHP or database version, and the Linux x64 matrix above already covers both of
  # those dimensions. Service containers are Linux-only, so actions-setup-mysql
  # starts a native MySQL per OS. No Windows ARM job: php.net ships no ARM64
  # Windows builds.
  platform:
    name: PHP 8.1 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-24.04-arm, macos-latest, macos-15-intel]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.1'
          extensions: mysqli, openssl, mbstring
          coverage: none

      - name: Start MySQL 8.0
        uses: shogo82148/actions-setup-mysql@076e636c45996ec8cb1a455c65f9f5364aeebd8a # v1.52.1
        with:
          mysql-version: '8.0'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit --colors=always
        env:
          DB_HOSTNAME: 127.0.0.1
          DB_USERNAME: root
          DB_PASSWORD: ''
          DB_DATABASE: phpunit_test_db

  summary:
    name: Timing summary
    runs-on: ubuntu-latest
    needs: test
    # Aggregates every matrix job and succeeds even when they fail, so it can't serve
    # as a required check; !cancelled() still builds the grid for failed runs
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download timing artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: timing-*
          merge-multiple: true
          path: timings

      - name: Build timing grid
        run: php .github/scripts/ci-timing-summary.php timings/*.json >> "$GITHUB_STEP_SUMMARY"
