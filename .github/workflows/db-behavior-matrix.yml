name: DB Behavior Matrix

# Manual-only: never runs on push. Dispatch from the Actions tab ("Run workflow") or
# with: gh workflow run db-behavior-matrix.yml
on:
  workflow_dispatch:
    inputs:
      database:
        description: 'Database (blank = all)'
        required: false
        type: choice
        # Dropdown convenience only - the matrix reads the canonical list from .github/db-matrix.json
        options:
          - ''
          - mysql:5.7
          - mysql:8.0
          - mysql:8.4
          - mysql:9.6
          - mysql:9.7
          - mariadb:10.2
          - mariadb:10.3
          - mariadb:10.4
          - mariadb:10.5
          - mariadb:10.6
          - mariadb:10.11
          - mariadb:11.4
          - mariadb:11.8
          - mariadb:12.3
          - mariadb:11.8+rocksdb
          - mariadb:12.3+rocksdb
          - percona/percona-server:5.7
          - percona/percona-server:8.0
          - percona/percona-server:8.4
          - percona/percona-server:8.0+rocksdb

jobs:
  db-matrix:
    name: Load database matrix
    runs-on: ubuntu-latest
    outputs:
      databases: ${{ steps.load.outputs.databases }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # A "+rocksdb" suffix means: same image, but load the RocksDB plugin before
      # probing. Split into {label, image, rocksdb} here because service containers
      # need the bare image name and expressions can't do string surgery
      - name: Read .github/db-matrix.json
        id: load
        run: |
          if [ -n "${{ inputs.database }}" ]; then
            LIST='["${{ inputs.database }}"]'
          else
            LIST=$(jq -c . .github/db-matrix.json)
          fi
          echo "databases=$(echo "$LIST" | jq -c 'map({label: ., image: (split("+")[0]), rocksdb: endswith("+rocksdb")})')" >> "$GITHUB_OUTPUT"

  probe:
    name: ${{ matrix.entry.label }}
    runs-on: ubuntu-latest
    needs: db-matrix

    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJSON(needs.db-matrix.outputs.databases) }}

    services:
      database:
        image: ${{ matrix.entry.image }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_ROOT_HOST: '%'
          # MariaDB-specific (ignored by MySQL)
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: yes
          MARIADB_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --innodb_initialized || mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --security-opt seccomp=unconfined

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      # The probe script uses plain mysqli with no dependencies, so no composer install.
      # Pinned to the minimum supported PHP so the script can't drift past it
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: '8.1'
          extensions: mysqli, openssl
          coverage: none

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -u root --silent 2>/dev/null && break
            sleep 1
          done

      # MariaDB images need the plugin package from the MariaDB apt repo; Percona
      # ships ha_rocksdb.so in the image. INSTALL SONAME/PLUGIN loads it without a
      # restart. The trailing SHOW ENGINES grep fails the job if the engine isn't
      # actually there, so a broken install can't silently probe as a stock server
      - name: Load RocksDB plugin
        if: ${{ matrix.entry.rocksdb }}
        run: |
          case "${{ matrix.entry.image }}" in
            mariadb:*)
              docker exec ${{ job.services.database.id }} sh -c "apt-get update -qq && apt-get install -y -qq mariadb-plugin-rocksdb"
              mysql -h 127.0.0.1 -u root -e "INSTALL SONAME 'ha_rocksdb'"
              ;;
            *)
              mysql -h 127.0.0.1 -u root -e "INSTALL PLUGIN ROCKSDB SONAME 'ha_rocksdb.so'"
              ;;
          esac
          mysql -h 127.0.0.1 -u root -e "SHOW ENGINES" | grep -i rocksdb

      - name: Run probes
        env:
          DB_HOSTNAME: 127.0.0.1
          DB_USERNAME: root
          DB_PASSWORD: ''
          DB_DATABASE: phpunit_test_db
          DB_LABEL: ${{ matrix.entry.label }}
        run: |
          SLUG=$(echo "${{ matrix.entry.label }}" | tr ':/+' '---')
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"
          php .github/scripts/db-behavior-probe.php --json="probe-$SLUG.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload probe results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: probe-${{ env.SLUG }}
          path: probe-*.json
          if-no-files-found: ignore

  summary:
    name: Compare servers
    runs-on: ubuntu-latest
    needs: probe
    # Aggregates every matrix job and succeeds even when they fail, so it can't serve
    # as a required check; !cancelled() still builds the comparison for failed runs
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Download probe results
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: probe-*
          merge-multiple: true
          path: probes

      - name: Build comparison
        run: php .github/scripts/db-behavior-merge.php probes/*.json >> "$GITHUB_STEP_SUMMARY"
