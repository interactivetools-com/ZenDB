name: DB Behavior Report

# Manual-only: never runs on push. Dispatch from the Actions tab ("Run workflow") or
# with: gh workflow run db-report.yml
on:
  workflow_dispatch:
    inputs:
      database:
        description: 'Database (blank = all)'
        required: false
        type: choice
        # Dropdown convenience only - the matrix reads the canonical list from .github/db-matrix.json
        options:
          - ''
          - mysql:5.7
          - mysql:8.0
          - mysql:8.4
          - mysql:9.6
          - mariadb:10.2
          - mariadb:10.4
          - mariadb:10.5
          - mariadb:10.6
          - mariadb:10.11
          - mariadb:11.4
          - mariadb:11.8
          - percona/percona-server:5.7
          - percona/percona-server:8.0
          - percona/percona-server:8.4

jobs:
  db-matrix:
    name: Load database matrix
    runs-on: ubuntu-latest
    outputs:
      databases: ${{ steps.load.outputs.databases }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read .github/db-matrix.json
        id: load
        run: echo "databases=$(jq -c . .github/db-matrix.json)" >> "$GITHUB_OUTPUT"

  probe:
    name: ${{ matrix.database }}
    runs-on: ubuntu-latest
    needs: db-matrix

    strategy:
      fail-fast: false
      matrix:
        database: ${{ inputs.database && fromJSON(format('["{0}"]', inputs.database)) || fromJSON(needs.db-matrix.outputs.databases) }}

    services:
      database:
        image: ${{ matrix.database }}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_ROOT_HOST: '%'
          # MariaDB-specific (ignored by MySQL)
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: yes
          MARIADB_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --innodb_initialized || mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
          --security-opt seccomp=unconfined

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # The probe script uses plain mysqli with no dependencies, so no composer install
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli, openssl
          coverage: none

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -u root --silent 2>/dev/null && break
            sleep 1
          done

      - name: Run probes
        env:
          DB_HOSTNAME: 127.0.0.1
          DB_USERNAME: root
          DB_PASSWORD: ''
          DB_DATABASE: phpunit_test_db
          DB_LABEL: ${{ matrix.database }}
        run: |
          SLUG=$(echo "${{ matrix.database }}" | tr ':/' '--')
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"
          php tools/db-behavior-report.php --json="report-$SLUG.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload probe results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ env.SLUG }}
          path: report-*.json
          if-no-files-found: ignore

  summary:
    name: Compare servers
    runs-on: ubuntu-latest
    needs: probe
    # Aggregates every matrix job and succeeds even when they fail, so it can't serve
    # as a required check; !cancelled() still builds the comparison for failed runs
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download probe results
        uses: actions/download-artifact@v4
        with:
          pattern: report-*
          merge-multiple: true
          path: reports

      - name: Build comparison
        run: php tools/db-behavior-merge.php reports/*.json >> "$GITHUB_STEP_SUMMARY"
